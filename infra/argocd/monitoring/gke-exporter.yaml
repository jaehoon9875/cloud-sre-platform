apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gke-spot-exporter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jaehoon9875/cloud-sre-platform
    targetRevision: main
    path: infra/manifests/gke-exporter
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
