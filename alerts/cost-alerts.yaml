apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gcp-cost-alerts
  namespace: monitoring
  labels:
    # kube-prometheus-stack이 이 Rule을 감지하도록 설정
    release: my-kube-prometheus-stack
spec:
  groups:
    - name: gcp.cost
      interval: 1h
      rules:
        # 전일 총 비용이 ₩15,000을 초과한 경우
        # 기준: 무료 체험 총액 ₩453,008(=$300)의 약 3.3% — 일별 과다 지출 조기 감지
        - alert: GCPDailyCostHigh
          expr: sum(gcp_cost_daily_krw) > 15000
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "GCP 일일 비용 경고"
            description: "어제 GCP 총 비용이 ₩{{ $value | printf \"%.0f\" }}로 ₩15,000을 초과했습니다."

        # 이번 달 누적 비용이 ₩299,000 초과 (무료 체험 총액 ₩453,008의 66%)
        - alert: GCPMonthlyCostWarning
          expr: max(gcp_cost_monthly_total_krw) > 299000
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "GCP 월간 비용 경고 (₩299,000 초과)"
            description: "이번 달 GCP 누적 비용이 ₩{{ $value | printf \"%.0f\" }}입니다. 무료 체험 크레딧(₩453,008)의 66%를 초과했습니다."

        # 이번 달 누적 비용이 ₩408,000 초과 (무료 체험 총액 ₩453,008의 90%)
        - alert: GCPMonthlyCostCritical
          expr: max(gcp_cost_monthly_total_krw) > 408000
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "GCP 월간 비용 위험 (₩408,000 초과)"
            description: "이번 달 GCP 누적 비용이 ₩{{ $value | printf \"%.0f\" }}입니다. 무료 체험 크레딧(₩453,008)의 90%를 초과했습니다. 즉시 비용 절감이 필요합니다."

        # billing-exporter가 24시간 이상 데이터를 전송하지 않은 경우
        - alert: BillingExporterDown
          expr: absent(gcp_cost_monthly_total_krw) == 1
          for: 25h
          labels:
            severity: warning
          annotations:
            summary: "billing-exporter 데이터 없음"
            description: "25시간 이상 Pushgateway에 비용 데이터가 수신되지 않았습니다. GitHub Actions workflow를 확인하세요."
