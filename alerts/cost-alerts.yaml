apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gcp-cost-alerts
  namespace: monitoring
  labels:
    # kube-prometheus-stack이 이 Rule을 감지하도록 설정
    release: my-kube-prometheus-stack
spec:
  groups:
    - name: gcp.cost
      interval: 1h
      rules:
        # 전일 총 비용이 $10를 초과한 경우
        - alert: GCPDailyCostHigh
          expr: sum(gcp_cost_daily_usd) > 10
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "GCP 일일 비용 경고"
            description: "어제 GCP 총 비용이 ${{ $value | printf \"%.2f\" }}로 $10를 초과했습니다."

        # 이번 달 누적 비용이 $200 초과 (예산 $300의 66%)
        - alert: GCPMonthlyCostWarning
          expr: max(gcp_cost_monthly_total_usd) > 200
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "GCP 월간 비용 경고 ($200 초과)"
            description: "이번 달 GCP 누적 비용이 ${{ $value | printf \"%.2f\" }}입니다. 예산($300)의 66%를 초과했습니다."

        # 이번 달 누적 비용이 $270 초과 (예산 $300의 90%)
        - alert: GCPMonthlyCostCritical
          expr: max(gcp_cost_monthly_total_usd) > 270
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "GCP 월간 비용 위험 ($270 초과)"
            description: "이번 달 GCP 누적 비용이 ${{ $value | printf \"%.2f\" }}입니다. 예산($300)의 90%를 초과했습니다. 즉시 비용 절감이 필요합니다."

        # billing-exporter가 24시간 이상 데이터를 전송하지 않은 경우
        - alert: BillingExporterDown
          expr: absent(gcp_cost_monthly_total_usd) == 1
          for: 25h
          labels:
            severity: warning
          annotations:
            summary: "billing-exporter 데이터 없음"
            description: "25시간 이상 Pushgateway에 비용 데이터가 수신되지 않았습니다. GitHub Actions workflow를 확인하세요."
