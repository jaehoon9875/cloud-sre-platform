name: 야간 GKE 클러스터 Scale-Down

on:
  # [비활성화] 매일 오후 11시 (KST) = UTC 14:00 자동 실행
  # 비활성화 사유: GKE 시스템 Pod(DaemonSet) 구조상 오토스케일러가 자동으로 노드를
  # scale-to-0 하지 않으며, 실제 워크로드가 없는 현재 시점에서는 의미 없는 실행.
  # 워크로드 배포 후 make cluster-down 동작 검증이 완료되면 주석 해제하여 재활성화.
  # (참고: docs/ISSUES.md #2)
  #
  # schedule:
  #   - cron: '0 14 * * *'

  # 수동 실행은 유지 — 동작 검증 시 GitHub Actions UI에서 트리거 가능
  workflow_dispatch:
    inputs:
      num_nodes:
        description: '노드 수 (0: scale-down, 1: scale-up)'
        required: true
        default: '0'

env:
  PROJECT_ID: cloud-sre-platform-dev
  REGION: asia-northeast3
  CLUSTER: sre-platform-cluster
  NODE_POOL: sre-platform-cluster-spot-pool

jobs:
  scale-down:
    name: 노드 수 축소
    runs-on: ubuntu-latest

    # GCP 인증을 위한 Workload Identity Federation 권한
    permissions:
      contents: read
      id-token: write

    steps:
      - name: GCP 인증 (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: gcloud CLI 설정
        uses: google-github-actions/setup-gcloud@v2

      - name: 현재 노드 수 확인
        run: |
          echo "=== 현재 노드 상태 ==="
          gcloud container node-pools describe ${{ env.NODE_POOL }} \
            --cluster ${{ env.CLUSTER }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format="value(autoscaling.minNodeCount, autoscaling.maxNodeCount)"

      - name: 노드 수 0으로 축소 (야간 비용 절감)
        run: |
          NUM_NODES=${{ github.event.inputs.num_nodes || '0' }}
          # 1단계: 오토스케일러 비활성화 (활성 상태에서 resize 시 즉시 재복구하는 문제 방지)
          echo "오토스케일러 비활성화..."
          gcloud container clusters update ${{ env.CLUSTER }} \
            --node-pool ${{ env.NODE_POOL }} \
            --no-enable-autoscaling \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --quiet
          # 2단계: 노드 수 조정 (regional 클러스터이므로 zone당 노드 수)
          echo "노드 수를 ${NUM_NODES}로 조정합니다..."
          gcloud container clusters resize ${{ env.CLUSTER }} \
            --node-pool ${{ env.NODE_POOL }} \
            --num-nodes ${NUM_NODES} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --quiet
          echo "완료: 노드 수 ${NUM_NODES}로 조정됨"
